<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Successfully Submitted!</title>
</head>
<style>
    *{
    box-sizing: border-box;
}
:root {
    --primary: #FFFFFF;
    --dark: #000;
    --light: #416099;
}

body {
    font-family: "IBM Plex Sans";
    background: var(--primary);
    margin: 0;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
}
hr {
    border: none;
    border-top: 1px solid rgb(104, 92, 92);
    width: 100%;
}

main {
    flex: 1;
}

.sticky1 {
    position: sticky;
    top: 0;
    background: var(--primary);
    padding: 0 60px;
    z-index: 5;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.logo {
    height: 100px;
    width: auto;
}

nav > ul {
    display: flex;
    list-style: none;
    gap: 50px;
    margin: 0;
    padding: 0;
}

nav > ul > li > a {
    text-decoration: none;
    color: var(--dark);
    font-size: 20px;
}
.box {
    max-width: 1000px;
    height: 200px;
    margin: auto;
    padding: 40px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    border-radius: 8px;
    margin-bottom: 50px;
    font-family: "IBM Plex Sans", sans-serif;
    text-align: center;
}

</style>
<body>
    <div class="sticky1">
    <img src="img/ibmlogo.png" class="logo">
    <nav>
        <ul>
            <li><a href="https://www.linkedin.com/feed/">Home</a></li>
            <li><a href="https://www.linkedin.com/in/ash-dacon/">Profile</a></li>
            <li><a href="https://www.ibm.com/careers/search">Careers</a></li>
            <li><a href="https://www.ibm.com/mysupport/s/?language=en_US&lnk=flathl">Support</a></li>
        </ul>
    </nav>
</div>
<hr>
<br><br>
<main>
        <div class="box">
             <h2 class="big-text">You successfully submitted your application!</h2>
</main>

   
    
</body>
</html>
